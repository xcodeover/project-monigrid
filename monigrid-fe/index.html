<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!--
          CSP defence-in-depth. The BE base URL is operator-configurable, so
          connect-src has to be permissive (we can't pin it at build time).
          'unsafe-eval' is needed for some bundled deps; 'unsafe-inline' on
          styles is needed by React inline style props.
        -->
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
        />
        <title>%VITE_APP_TITLE%</title>
    </head>
    <body class="dark">
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
